<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro (Core)</title>
  </head>

  <body>
    <h1>Crear una cuenta en Discord</h1>
    <form action="#" method="POST">
      <div>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre">
      </div>
      <br>
      <div>
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido">
      </div>
      <br>
      <div>
        <label for="correo_electrónico">Correo electrónico:</label>
        <input type="text" id="correo_electrónico" name="correo electrónico">
      </div>
      <br>
      <div>
        <label for="clave">Contraseña:</label>
        <input type="password" id="clave" name="clave">
      </div>
      <br>
      <div>
        <label for="Confirmar_contraseña">Confirmar contraseña:</label>
        <input type="password" id="Confirmar_contraseña" name="clave">
      </div>
      <br>
      <div>
        <label for="fecha_nacimiento">Fecha de nacimiento:</label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
      </div>
      <br>
      <div>
        <label>Género:</label>
        <input type="radio" name="Género" value="Masculino">
        Masculino
        <input type="radio" name="Género" value="Femenino">
        Femenino
        <input type="radio" name="Género" value="Prefiero no decirlo">
        Prefiero no decirlo
      </div>
      <br>
      <div>
        <label>Descripción sobre ti</label><br>
        <textarea name="Comentarios" rows="4" cols="30"></textarea>
      </div>
      <br>
      <div>
        <label for="intereses">Selecciona tus intereses:</label>
        <select id="intereses" name="intereses">
          <option value="Música">Música</option>
          <option value="Películas">Películas</option>
          <option value="Deportes">Deportes</option>
          <option value="Tecnología">Tecnología</option>
        </select>
      </div>
      <br>
      <div>
        <input type="checkbox" id="acepto" name="acepto">
        <label for="acepto"
          >Al registrarte, aceptas los
          <a href="#" target="_blank">Términos y condiciones de Discord.</a>
        </label>
      </div>
      <br>
      <input type="submit" value="Registrarse">
    </form>
  </body>
</html>
